openapi: 3.0.0
info:
  title: TodoList API
  version: 1.0.0
  description: |
    개인 사용자가 회원가입, 로그인 후 자신의 Todo를 생성, 조회, 완료 상태 변경,
    삭제할 수 있는 TodoList 앱 REST API 명세입니다.

    인증은 Supabase Auth가 아닌 백엔드 자체 JWT 방식으로 처리하며,
    데이터베이스는 Supabase PostgreSQL을 사용합니다.
servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://api.todolist.example.com/api
    description: Production server

tags:
  - name: Auth
    description: 자체 JWT 기반 회원가입 및 로그인
  - name: Todos
    description: 로그인한 사용자의 개인 Todo 관리

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: 회원가입
      description: |
        이메일과 비밀번호로 사용자 계정을 생성합니다.
        비밀번호는 서버에서 해시한 뒤 `users.password_hash`에 저장하며, 응답에는 포함하지 않습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                summary: 정상 회원가입 요청
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: 생성된 사용자와 JWT
                  value:
                    success: true
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                      tokenType: Bearer
                      user:
                        id: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                        email: user@example.com
                        createdAt: '2026-06-22T09:00:00Z'
                        updatedAt: '2026-06-22T09:00:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: 이미 가입된 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicatedEmail:
                  value:
                    success: false
                    error:
                      code: EMAIL_ALREADY_EXISTS
                      message: 이미 가입된 이메일입니다.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      description: 이메일과 비밀번호를 검증하고 보호된 Todo API 호출에 사용할 JWT를 발급합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                summary: 정상 로그인 요청
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                      tokenType: Bearer
                      user:
                        id: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                        email: user@example.com
                        createdAt: '2026-06-22T09:00:00Z'
                        updatedAt: '2026-06-22T09:00:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: 이메일 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    success: false
                    error:
                      code: INVALID_CREDENTIALS
                      message: 이메일 또는 비밀번호가 올바르지 않습니다.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /todos:
    get:
      tags:
        - Todos
      summary: 내 Todo 전체 목록 조회
      description: |
        로그인한 사용자의 Todo 목록 전체를 생성일 내림차순으로 조회합니다.
        서버는 클라이언트가 전달한 사용자 ID를 신뢰하지 않고 JWT의 사용자 ID로 `todos.user_id`를 필터링합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: completed
          in: query
          required: false
          description: 완료 여부로 목록을 필터링합니다. 생략하면 전체 Todo를 반환합니다.
          schema:
            type: boolean
          example: false
      responses:
        '200':
          description: Todo 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      - id: c67e7c8a-9a4a-4db0-9208-cf1388d1ec71
                        userId: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                        title: PRD 검토하기
                        completed: false
                        createdAt: '2026-06-22T09:10:00Z'
                        updatedAt: '2026-06-22T09:10:00Z'
                      - id: 284bb081-7f64-4c52-8b5f-dc62e61c55ed
                        userId: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                        title: ERD 작성하기
                        completed: true
                        createdAt: '2026-06-22T09:00:00Z'
                        updatedAt: '2026-06-22T09:05:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Todos
      summary: Todo 추가
      description: |
        로그인한 사용자에게 새 Todo를 생성합니다.
        빈 문자열 또는 공백만 있는 `title`은 허용하지 않습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreateRequest'
            examples:
              default:
                summary: Todo 생성 요청
                value:
                  title: API 명세 작성하기
      responses:
        '201':
          description: Todo 생성 성공
          headers:
            Location:
              description: 생성된 Todo 리소스 경로
              schema:
                type: string
              example: /api/todos/c67e7c8a-9a4a-4db0-9208-cf1388d1ec71
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: c67e7c8a-9a4a-4db0-9208-cf1388d1ec71
                      userId: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                      title: API 명세 작성하기
                      completed: false
                      createdAt: '2026-06-22T09:10:00Z'
                      updatedAt: '2026-06-22T09:10:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /todos/{todoId}/completed:
    patch:
      tags:
        - Todos
      summary: Todo 완료 상태 변경
      description: |
        로그인한 사용자가 자신의 Todo 완료 여부를 체크하거나 해제합니다.
        서버는 JWT의 사용자 ID와 `todoId`를 함께 조건으로 사용하여 다른 사용자의 Todo 변경을 차단합니다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCompletedRequest'
            examples:
              complete:
                summary: 완료 처리
                value:
                  completed: true
              reopen:
                summary: 완료 해제
                value:
                  completed: false
      responses:
        '200':
          description: Todo 완료 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: c67e7c8a-9a4a-4db0-9208-cf1388d1ec71
                      userId: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
                      title: API 명세 작성하기
                      completed: true
                      createdAt: '2026-06-22T09:10:00Z'
                      updatedAt: '2026-06-22T09:20:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/TodoNotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /todos/{todoId}:
    delete:
      tags:
        - Todos
      summary: Todo 삭제
      description: |
        로그인한 사용자가 자신의 Todo를 삭제합니다.
        서버는 JWT의 사용자 ID와 `todoId`를 함께 조건으로 사용하여 다른 사용자의 Todo 삭제를 차단합니다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '204':
          description: Todo 삭제 성공. 응답 본문이 없습니다.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/TodoNotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: '`Authorization: Bearer {accessToken}` 형식으로 JWT를 전달합니다.'

  parameters:
    TodoId:
      name: todoId
      in: path
      required: true
      description: Todo UUID
      schema:
        type: string
        format: uuid
      example: c67e7c8a-9a4a-4db0-9208-cf1388d1ec71

  responses:
    ValidationError:
      description: 요청 값 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidTitle:
              value:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
                  details:
                    - field: title
                      reason: Todo 제목은 공백일 수 없습니다.
    UnauthorizedError:
      description: 인증 실패 또는 토큰 누락
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingToken:
              value:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: 인증 토큰이 필요합니다.
            invalidToken:
              value:
                success: false
                error:
                  code: INVALID_TOKEN
                  message: 인증 토큰이 유효하지 않습니다.
    TodoNotFoundError:
      description: Todo를 찾을 수 없거나 현재 사용자에게 속하지 않음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                success: false
                error:
                  code: TODO_NOT_FOUND
                  message: Todo를 찾을 수 없습니다.
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              value:
                success: false
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: 서버 내부 오류가 발생했습니다.

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: 회원가입과 로그인에 사용하는 이메일입니다.
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 100
          description: 서버에서 안전하게 해시하여 저장할 원문 비밀번호입니다.
          example: Password123!

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: Password123!

    TodoCreateRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: 사용자가 입력한 할 일 내용입니다. 공백만 있는 값은 허용하지 않습니다.
          example: API 명세 작성하기

    TodoCompletedRequest:
      type: object
      required:
        - completed
      properties:
        completed:
          type: boolean
          description: Todo 완료 여부입니다.
          example: true

    AuthResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - accessToken
            - tokenType
            - user
          properties:
            accessToken:
              type: string
              description: 백엔드가 발급한 JWT입니다.
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
            tokenType:
              type: string
              enum:
                - Bearer
              example: Bearer
            user:
              $ref: '#/components/schemas/User'

    TodoListResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Todo'

    TodoResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Todo'

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 클라이언트가 분기 처리할 수 있는 에러 코드입니다.
              example: VALIDATION_ERROR
            message:
              type: string
              description: 에러 메시지입니다.
              example: 요청 값이 올바르지 않습니다.
            details:
              type: array
              description: 필드 단위 검증 오류 상세입니다.
              items:
                $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      required:
        - field
        - reason
      properties:
        field:
          type: string
          example: title
        reason:
          type: string
          example: Todo 제목은 공백일 수 없습니다.

    User:
      type: object
      description: 'ERD의 `users` 테이블 응답 모델입니다. `password_hash`는 절대 응답하지 않습니다.'
      required:
        - id
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: '`users.id` 기본키입니다.'
          example: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
        email:
          type: string
          format: email
          maxLength: 255
          description: '`users.email` 값입니다.'
          example: user@example.com
        createdAt:
          type: string
          format: date-time
          description: '`users.created_at` 값입니다.'
          example: '2026-06-22T09:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: '`users.updated_at` 값입니다.'
          example: '2026-06-22T09:00:00Z'

    Todo:
      type: object
      description: 'ERD의 `todos` 테이블 응답 모델입니다.'
      required:
        - id
        - userId
        - title
        - completed
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: '`todos.id` 기본키입니다.'
          example: c67e7c8a-9a4a-4db0-9208-cf1388d1ec71
        userId:
          type: string
          format: uuid
          description: '`todos.user_id` 외래키입니다. JWT의 사용자 ID로 설정됩니다.'
          example: 8b9c64f2-0d3d-42c7-8d9f-98a7461f1d91
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: '`todos.title` 값입니다.'
          example: API 명세 작성하기
        completed:
          type: boolean
          description: '`todos.completed` 값입니다.'
          example: false
        createdAt:
          type: string
          format: date-time
          description: '`todos.created_at` 값입니다.'
          example: '2026-06-22T09:10:00Z'
        updatedAt:
          type: string
          format: date-time
          description: '`todos.updated_at` 값입니다.'
          example: '2026-06-22T09:10:00Z'
